<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle Financeiro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:#f1f5f9;
    padding:20px;
    color:#1e293b;
}

.container{
    max-width:1200px;
    margin:auto;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:20px;
    margin-bottom:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:16px;
    box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.card h2{
    margin-bottom:15px;
    font-size:20px;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #cbd5e1;
    border-radius:10px;
    margin-bottom:10px;
    font-size:16px;
}

button{
    border:none;
    padding:12px 20px;
    border-radius:10px;
    cursor:pointer;
    font-weight:600;
    color:white;
    transition:0.3s;
}

button:hover{
    opacity:0.9;
}

.btn-green{
    background:#10b981;
}

.btn-red{
    background:#ef4444;
}

.btn-blue{
    background:#6366f1;
}

.btn-orange{
    background:#f59e0b;
}

.total{
    font-size:30px;
    font-weight:700;
    margin-top:10px;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
}

th{
    background:#6366f1;
    color:white;
    padding:12px;
}

td{
    padding:12px;
    border-bottom:1px solid #e2e8f0;
    text-align:center;
}

.delete-btn{
    background:#ef4444;
    padding:8px 12px;
}

.resumo{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-bottom:20px;
}

.resumo-card{
    background:white;
    padding:20px;
    border-radius:16px;
    box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.resumo-card h3{
    margin-bottom:10px;
}

.green{
    color:#10b981;
}

.red{
    color:#ef4444;
}

.blue{
    color:#6366f1;
}

.orange{
    color:#f59e0b;
}
</style>
</head>

<body>

<div class="container">

<h1>💰 Meu Controle Financeiro</h1>

<div class="resumo">

<div class="resumo-card">
<h3>Total Receitas</h3>
<div class="total green" id="totalReceitas">R$ 0,00</div>
</div>

<div class="resumo-card">
<h3>Total Gastos</h3>
<div class="total red" id="totalGastos">R$ 0,00</div>
</div>

<div class="resumo-card">
<h3>Guardado p/ Carro</h3>
<div class="total blue" id="totalEconomia">R$ 0,00</div>
</div>

<div class="resumo-card">
<h3>Saldo Final</h3>
<div class="total orange" id="saldoFinal">R$ 0,00</div>
</div>

</div>

<div class="grid">

<!-- RECEITAS -->
<div class="card">

<h2>💵 Adicionar Receita</h2>

<input type="number" id="dinheiro" placeholder="Dinheiro">

<input type="number" id="pix" placeholder="PIX">

<input type="text" id="descReceita" placeholder="Descrição">

<button class="btn-green" onclick="addReceita()">
Adicionar Receita
</button>

<table>
<thead>
<tr>
<th>Descrição</th>
<th>Total</th>
<th>Ação</th>
</tr>
</thead>

<tbody id="receitasTabela"></tbody>

</table>

</div>

<!-- GASTOS -->
<div class="card">

<h2>🧾 Adicionar Gasto</h2>

<input type="number" id="carne" placeholder="Carne">

<input type="number" id="fruta" placeholder="Fruta">

<input type="number" id="internet" placeholder="Internet">

<input type="text" id="descGasto" placeholder="Descrição">

<button class="btn-red" onclick="addGasto()">
Adicionar Gasto
</button>

<table>

<thead>
<tr>
<th>Descrição</th>
<th>Total</th>
<th>Ação</th>
</tr>
</thead>

<tbody id="gastosTabela"></tbody>

</table>

</div>

</div>

<div class="grid">

<!-- ECONOMIA -->
<div class="card">

<h2>🚗 Economia Carro</h2>

<input type="number" id="valorEconomia" placeholder="Valor">

<button class="btn-blue" onclick="guardarDinheiro()">
Guardar Dinheiro
</button>

<table>

<thead>
<tr>
<th>Valor</th>
<th>Ação</th>
</tr>
</thead>

<tbody id="economiaTabela"></tbody>

</table>

</div>

<!-- EMPRESTIMO -->
<div class="card">

<h2>🤝 Empréstimos</h2>

<input type="text" id="nomeEmp" placeholder="Nome da pessoa">

<input type="number" id="valorEmp" placeholder="Valor emprestado">

<button class="btn-orange" onclick="addEmprestimo()">
Adicionar Empréstimo
</button>

<table>

<thead>
<tr>
<th>Nome</th>
<th>Valor</th>
<th>Ação</th>
</tr>
</thead>

<tbody id="emprestimosTabela"></tbody>

</table>

</div>

</div>

</div>

<script>

let receitas = [];
let gastos = [];
let economia = [];
let emprestimos = [];

function formatar(valor){
    return valor.toLocaleString('pt-BR',{
        style:'currency',
        currency:'BRL'
    });
}

function atualizarResumo(){

    let totalReceitas = receitas.reduce((s,r)=>s+r.total,0);

    let totalGastos = gastos.reduce((s,g)=>s+g.total,0);

    let totalEconomia = economia.reduce((s,e)=>s+e.valor,0);

    let saldo = totalReceitas - totalGastos - totalEconomia;

    document.getElementById('totalReceitas').innerText = formatar(totalReceitas);

    document.getElementById('totalGastos').innerText = formatar(totalGastos);

    document.getElementById('totalEconomia').innerText = formatar(totalEconomia);

    document.getElementById('saldoFinal').innerText = formatar(saldo);

}

function addReceita(){

    let dinheiro = parseFloat(document.getElementById('dinheiro').value) || 0;

    let pix = parseFloat(document.getElementById('pix').value) || 0;

    let desc = document.getElementById('descReceita').value || 'Receita';

    let total = dinheiro + pix;

    if(total <= 0){
        alert('Digite um valor');
        return;
    }

    let receita = {
        id:Date.now(),
        desc,
        total
    };

    receitas.push(receita);

    renderReceitas();

    atualizarResumo();

    limparCamposReceita();
}

function renderReceitas(){

    let tabela = document.getElementById('receitasTabela');

    tabela.innerHTML = '';

    receitas.forEach(r=>{

        tabela.innerHTML += `
        <tr>
            <td>${r.desc}</td>
            <td>${formatar(r.total)}</td>
            <td>
                <button class="delete-btn" onclick="deleteReceita(${r.id})">
                    X
                </button>
            </td>
        </tr>
        `;
    });
}

function deleteReceita(id){

    receitas = receitas.filter(r=>r.id !== id);

    renderReceitas();

    atualizarResumo();
}

function limparCamposReceita(){

    document.getElementById('dinheiro').value = '';

    document.getElementById('pix').value = '';

    document.getElementById('descReceita').value = '';
}

function addGasto(){

    let carne = parseFloat(document.getElementById('carne').value) || 0;

    let fruta = parseFloat(document.getElementById('fruta').value) || 0;

    let internet = parseFloat(document.getElementById('internet').value) || 0;

    let desc = document.getElementById('descGasto').value || 'Gasto';

    let total = carne + fruta + internet;

    if(total <= 0){
        alert('Digite um valor');
        return;
    }

    let gasto = {
        id:Date.now(),
        desc,
        total
    };

    gastos.push(gasto);

    renderGastos();

    atualizarResumo();

    limparCamposGastos();
}

function renderGastos(){

    let tabela = document.getElementById('gastosTabela');

    tabela.innerHTML = '';

    gastos.forEach(g=>{

        tabela.innerHTML += `
        <tr>
            <td>${g.desc}</td>
            <td>${formatar(g.total)}</td>
            <td>
                <button class="delete-btn" onclick="deleteGasto(${g.id})">
                    X
                </button>
            </td>
        </tr>
        `;
    });
}

function deleteGasto(id){

    gastos = gastos.filter(g=>g.id !== id);

    renderGastos();

    atualizarResumo();
}

function limparCamposGastos(){

    document.getElementById('carne').value = '';

    document.getElementById('fruta').value = '';

    document.getElementById('internet').value = '';

    document.getElementById('descGasto').value = '';
}

function guardarDinheiro(){

    let valor = parseFloat(document.getElementById('valorEconomia').value);

    if(!valor || valor <= 0){
        alert('Digite um valor válido');
        return;
    }

    economia.push({
        id:Date.now(),
        valor
    });

    renderEconomia();

    atualizarResumo();

    document.getElementById('valorEconomia').value = '';
}

function renderEconomia(){

    let tabela = document.getElementById('economiaTabela');

    tabela.innerHTML = '';

    economia.forEach(e=>{

        tabela.innerHTML += `
        <tr>
            <td>${formatar(e.valor)}</td>
            <td>
                <button class="delete-btn" onclick="deleteEconomia(${e.id})">
                    X
                </button>
            </td>
        </tr>
        `;
    });
}

function deleteEconomia(id){

    economia = economia.filter(e=>e.id !== id);

    renderEconomia();

    atualizarResumo();
}

function addEmprestimo(){

    let nome = document.getElementById('nomeEmp').value;

    let valor = parseFloat(document.getElementById('valorEmp').value);

    if(!nome || !valor){
        alert('Preencha tudo');
        return;
    }

    emprestimos.push({
        id:Date.now(),
        nome,
        valor
    });

    renderEmprestimos();

    document.getElementById('nomeEmp').value = '';

    document.getElementById('valorEmp').value = '';
}

function renderEmprestimos(){

    let tabela = document.getElementById('emprestimosTabela');

    tabela.innerHTML = '';

    emprestimos.forEach(e=>{

        tabela.innerHTML += `
        <tr>
            <td>${e.nome}</td>
            <td>${formatar(e.valor)}</td>
            <td>
                <button class="delete-btn" onclick="deleteEmprestimo(${e.id})">
                    X
                </button>
            </td>
        </tr>
        `;
    });
}

function deleteEmprestimo(id){

    emprestimos = emprestimos.filter(e=>e.id !== id);

    renderEmprestimos();
}

</script>

</body>
</html>
